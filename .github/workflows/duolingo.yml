name: Duolingo Daily Practice

on:
  schedule:
    # Run daily at 7:00 AM UTC (adjust to your timezone)
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      max_lessons:
        description: 'Number of lessons to complete'
        required: false
        default: '3'

jobs:
  practice:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install python-dotenv playwright openai
          playwright install chromium
          playwright install-deps chromium

      - name: Run Duolingo Agent
        env:
          DUO_EMAIL: ${{ secrets.DUO_EMAIL }}
          DUO_PASSWORD: ${{ secrets.DUO_PASSWORD }}
          DUO_JWT: ${{ secrets.DUO_JWT }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DUO_PROFILE_URL: ${{ secrets.DUO_PROFILE_URL }}
          HEADLESS: 'true'
          MAX_LESSONS: ${{ github.event.inputs.max_lessons || '3' }}
        run: python duolingo_cn_for_en.py

      - name: Save session for next run
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: duo-session
          path: duo_session.json
          retention-days: 7

      - name: Save debug screenshots
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: debug-screenshots
          path: |
            login_debug.png
            login_failed.png
          retention-days: 3
          if-no-files-found: ignore
